name: Deploy Stratum

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "prod"
        type: choice
        options: [dev, staging, prod]

env:
  GCP_REGION: us-central1
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"

permissions:
  contents: read
  id-token: write  # Workload Identity Federation

jobs:
  # ── Tests ──────────────────────────────────────────────────────────────────
  test-api:
    name: Test API
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"

      - name: Lint
        run: ruff check .

      - name: Run tests
        run: pytest tests/ -v --tb=short

  test-frontend:
    name: Test Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install & test
        working-directory: frontend
        run: |
          npm ci
          npm run lint
          npm test -- --run
          npm run build

  # ── Build & Push API Image ─────────────────────────────────────────────────
  build-api:
    name: Build API Image
    needs: [test-api]
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.meta.outputs.image }}
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet

      - id: meta
        name: Set image tag
        run: |
          REPO="${{ env.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/stratum-prod-docker"
          TAG="${GITHUB_SHA::8}"
          echo "image=${REPO}/api:${TAG}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        run: |
          docker build -t ${{ steps.meta.outputs.image }} .
          docker push ${{ steps.meta.outputs.image }}

  # ── Build & Deploy Frontend ────────────────────────────────────────────────
  deploy-frontend:
    name: Deploy Frontend
    needs: [test-frontend]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        working-directory: frontend
        env:
          VITE_API_URL: ${{ secrets.API_URL }}
        run: |
          npm ci
          npm run build

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Upload to GCS
        run: |
          gsutil -m rsync -r -d frontend/dist gs://${{ secrets.FRONTEND_BUCKET }}

      - name: Invalidate CDN cache
        run: |
          gcloud compute url-maps invalidate-cdn-cache stratum-prod-frontend-urlmap \
            --path "/*" --async

  # ── Deploy API to Cloud Run ────────────────────────────────────────────────
  deploy-api:
    name: Deploy API
    needs: [build-api]
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy stratum-prod-api \
            --image ${{ needs.build-api.outputs.image }} \
            --region ${{ env.GCP_REGION }} \
            --quiet

      - name: Verify deployment
        run: |
          URL=$(gcloud run services describe stratum-prod-api \
            --region ${{ env.GCP_REGION }} \
            --format 'value(status.url)')
          curl -sf "${URL}/api/health" | jq .
